# Render.com blueprint — deploys the Next.js app as a Node web service.
# Runs the same codebase as Vercel; logo storage stays on Vercel Blob (shared
# store), so the only required secret is BLOB_READ_WRITE_TOKEN.
#
# Uses Next.js `output: "standalone"` (see next.config.ts) for a leaner runtime
# that fits the 512MB free tier. The build copies static assets + public/ into
# the standalone dir (Next doesn't do this automatically), then we run the
# minimal server directly. NODE_OPTIONS caps the V8 heap so it GCs before the
# 512MB OOM ceiling; HOSTNAME=0.0.0.0 lets Render reach the process.
services:
  - type: web
    name: insurance-microsite
    runtime: node
    plan: free # free tier; note: instance sleeps after ~15 min idle and cold-starts on next request
    region: oregon # pick the closest region
    buildCommand: npm ci && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    startCommand: node .next/standalone/server.js # reads Render's injected $PORT
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: HOSTNAME
        value: 0.0.0.0
      - key: BLOB_READ_WRITE_TOKEN
        sync: false # secret; set in the Render dashboard, use the same token as the Vercel project
